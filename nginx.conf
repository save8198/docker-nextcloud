events {}
http {
    server {
        listen 80;
        server_name abc.ddns.net; # Replace this with your domain

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name abc.ddns.net; # Replace this with your domain

        ssl_certificate /etc/letsencrypt/live/abc.ddns.net/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/abc.ddns.net/privkey.pem;

        location / {
            proxy_pass http://app:80; #Nextcloud container
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
            client_max_body_size 10G;
            add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
        }
    }
}